name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Strip leading 'v' from tag (v1.2.3 → 1.2.3); default to 0.0.0-dev
      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── System tools ───────────────────────────────────────────────────
      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --yes

      - name: Install UPX + create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install upx create-dmg

      - name: Install UPX + FUSE (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y upx-ucl libfuse2

      # ── Python dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip uninstall -y torch torchvision torchaudio ultralytics || true

      # ── Icons ──────────────────────────────────────────────────────────
      - name: Generate icons
        run: python assets/generate_icons.py

      - name: Generate icns (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon_${size}.png \
              --out assets/icon.iconset/icon_${size}x${size}.png
          done
          sips -z 32  32  assets/icon_16.png  --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 64  64  assets/icon_32.png  --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 256 256 assets/icon_128.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 512 512 assets/icon_256.png --out assets/icon.iconset/icon_256x256@2x.png
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      # ── PyInstaller — base build (no AI) ──────────────────────────────
      - name: Build with PyInstaller (base)
        run: pyinstaller coralx.spec --noconfirm

      # ── PyInstaller — AI bundle ────────────────────────────────────────
      - name: Install AI dependencies
        run: pip install "ultralytics>=8.0.0"

      - name: Build with PyInstaller (AI bundle)
        run: pyinstaller coralx-ai.spec --noconfirm

      - name: Show build sizes
        shell: bash
        run: du -sh dist/coralX* 2>/dev/null || true

      # ── Windows: Inno Setup installers ────────────────────────────────
      - name: Create installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          iscc /DAppVersion="${{ steps.version.outputs.version }}" installer\windows.iss
          iscc /DAppVersion="${{ steps.version.outputs.version }}" installer\windows-ai.iss

      # ── macOS: DMGs ───────────────────────────────────────────────────
      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "coralX" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "coralX.app" 175 190 \
            --hide-extension "coralX.app" \
            --app-drop-link 425 190 \
            "coralX-mac.dmg" \
            "dist/coralX.app"
          create-dmg \
            --volname "coralX AI" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "coralX-ai.app" 175 190 \
            --hide-extension "coralX-ai.app" \
            --app-drop-link 425 190 \
            "coralX-mac-ai.dmg" \
            "dist/coralX-ai.app"

      # ── Linux: AppImages ──────────────────────────────────────────────
      - name: Create AppImages (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q -O appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage

          mkdir -p AppDir
          cp -r dist/coralX/. AppDir/
          cp installer/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun
          cp installer/coralx.desktop AppDir/
          cp assets/icon_256.png AppDir/coralX.png
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 \
            ./appimagetool.AppImage AppDir coralX-linux.AppImage

          mkdir -p AppDir-ai
          cp -r dist/coralX-ai/. AppDir-ai/
          cp installer/AppRun AppDir-ai/AppRun
          chmod +x AppDir-ai/AppRun
          cp installer/coralx.desktop AppDir-ai/
          cp assets/icon_256.png AppDir-ai/coralX.png
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 \
            ./appimagetool.AppImage AppDir-ai coralX-linux-ai.AppImage

      # ── Upload artifacts ───────────────────────────────────────────────
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-windows-setup.exe
          path: coralX-windows-setup.exe
          retention-days: 7

      - name: Upload artifact (Windows AI)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-windows-setup-ai.exe
          path: coralX-windows-setup-ai.exe
          retention-days: 7

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-mac.dmg
          path: coralX-mac.dmg
          retention-days: 7

      - name: Upload artifact (macOS AI)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-mac-ai.dmg
          path: coralX-mac-ai.dmg
          retention-days: 7

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-linux.AppImage
          path: coralX-linux.AppImage
          retention-days: 7

      - name: Upload artifact (Linux AI)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-linux-ai.AppImage
          path: coralX-linux-ai.AppImage
          retention-days: 7

  # ── GitHub Release (tag-triggered only) ─────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: coralX ${{ github.ref_name }}
          body: |
            ## coralX ${{ github.ref_name }}

            ### Download

            Pick the build that fits your needs:

            | | Windows | macOS | Linux |
            |---|---|---|---|
            | **Base** (~80–100 MB) | `coralX-windows-setup.exe` | `coralX-mac.dmg` | `coralX-linux.AppImage` |
            | **AI bundle** (~500–700 MB) | `coralX-windows-setup-ai.exe` | `coralX-mac-ai.dmg` | `coralX-linux-ai.AppImage` |

            **Base** — coral point-count app, no AI. To enable AI auto-label later: `pip install ultralytics>=8.0.0`

            **AI bundle** — includes PyTorch + ultralytics. AI auto-label works offline, no extra install needed.

            #### Install instructions
            - **Windows:** Run the `.exe` → follow the wizard → launch from Start Menu
            - **macOS:** Open the `.dmg` → drag coralX to Applications
            - **Linux:** `chmod +x coralX-linux*.AppImage` → double-click or run directly

            > **macOS:** First launch may require right-clicking → Open to bypass Gatekeeper (app is unsigned).
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
