name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  import-check:
    name: Import check (headless)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check all modules import cleanly
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "from src.models.project import Project, ImageAnnotation, Point"
          python -c "from src.core.point_generator import generate_points"
          python -c "from src.core.statistics import image_coverage, project_summary"
          python -c "from src.core.exporter import export_csv, export_excel"
          python -c "from src.core.importer import import_cpce_excel, import_cpce_cpc"

