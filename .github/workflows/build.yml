name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Strip leading 'v' from tag (v1.2.3 → 1.2.3); default to 0.0.0-dev
      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── System tools ───────────────────────────────────────────────────
      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup --yes --no-progress

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install FUSE (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libfuse2

      # ── Python dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # ── Icons ──────────────────────────────────────────────────────────
      - name: Generate icons
        run: python assets/generate_icons.py

      - name: Generate icns (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon_${size}.png \
              --out assets/icon.iconset/icon_${size}x${size}.png
          done
          sips -z 32  32  assets/icon_16.png  --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 64  64  assets/icon_32.png  --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 256 256 assets/icon_128.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 512 512 assets/icon_256.png --out assets/icon.iconset/icon_256x256@2x.png
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      # ── PyInstaller ────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller coralx.spec --noconfirm

      - name: Show build size
        shell: bash
        run: du -sh dist/coralX* 2>/dev/null || true

      # ── Windows: Inno Setup installer ─────────────────────────────────
      - name: Create installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion="${{ steps.version.outputs.version }}" /O"." installer\windows.iss
          if (-not (Test-Path "coralX-windows-setup.exe")) {
            Write-Error "coralX-windows-setup.exe not found after iscc"
            exit 1
          }

      # ── macOS: DMG ────────────────────────────────────────────────────
      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "coralX" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "coralX.app" 175 190 \
            --hide-extension "coralX.app" \
            --app-drop-link 425 190 \
            "coralX-mac.dmg" \
            "dist/coralX.app"

      # ── Linux: AppImage ───────────────────────────────────────────────
      - name: Create AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q -O appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage

          mkdir -p AppDir
          cp -r dist/coralX/. AppDir/
          cp installer/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun
          cp installer/coralx.desktop AppDir/
          cp assets/icon_256.png AppDir/coralX.png
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 \
            ./appimagetool.AppImage AppDir coralX-linux.AppImage

      # ── Upload artifacts ───────────────────────────────────────────────
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-windows-setup.exe
          path: coralX-windows-setup.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-mac.dmg
          path: coralX-mac.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coralX-linux.AppImage
          path: coralX-linux.AppImage
          if-no-files-found: error
          retention-days: 7

  # ── GitHub Release (tag-triggered only) ─────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: coralX ${{ github.ref_name }}
          body: |
            ## coralX ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |---|---|
            | **Windows** | `coralX-windows-setup.exe` |
            | **macOS** | `coralX-mac.dmg` |
            | **Linux** | `coralX-linux.AppImage` |

            AI auto-label (YOLOv8) is included — no extra install needed.

            #### Install instructions
            - **Windows:** Run the `.exe` → follow the wizard → launch from Start Menu
            - **macOS:** Open the `.dmg` → drag coralX to Applications
            - **Linux:** `chmod +x coralX-linux.AppImage` → double-click or run directly

            > **macOS:** First launch may require right-clicking → Open to bypass Gatekeeper (app is unsigned).
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
