name: Build

on:
  push:
    tags:
      - "v*"          # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: coralX.exe
            dist_path: dist/coralX/coralX.exe

          - os: macos-latest
            artifact: coralX-mac.zip
            dist_path: dist/coralX.app

          - os: ubuntu-latest
            artifact: coralX-linux.tar.gz
            dist_path: dist/coralX

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --yes

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: python assets/generate_icons.py

      - name: Generate icns (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon_${size}.png --out assets/icon.iconset/icon_${size}x${size}.png
          done
          sips -z 32  32  assets/icon_16.png  --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 64  64  assets/icon_32.png  --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 256 256 assets/icon_128.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 512 512 assets/icon_256.png --out assets/icon.iconset/icon_256x256@2x.png
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Build with PyInstaller
        run: pyinstaller coralx.spec --noconfirm

      - name: Show build size
        shell: bash
        run: du -sh dist/coralX* 2>/dev/null || true

      # ── Windows: zip the dist folder ──────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\coralX -DestinationPath coralX-windows.zip

      # ── macOS: zip the .app bundle ─────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: zip -r coralX-mac.zip dist/coralX.app

      # ── Linux: tar.gz the dist folder ─────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czvf coralX-linux.tar.gz -C dist coralX

      # ── Upload artifact for this run ───────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            coralX-windows.zip
            coralX-mac.zip
            coralX-linux.tar.gz
          if-no-files-found: ignore
          retention-days: 7

  # ── Create GitHub Release when triggered by a tag ─────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: coralX ${{ github.ref_name }}
          body: |
            ## coralX ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |---|---|
            | Windows | `coralX-windows.zip` → extract → run `coralX.exe` |
            | macOS | `coralX-mac.zip` → extract → open `coralX.app` |
            | Linux | `coralX-linux.tar.gz` → extract → run `./coralX` |

            ### Notes
            - No Python installation required
            - AI auto-label requires installing ultralytics separately:
              `pip install ultralytics>=8.0.0`
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
